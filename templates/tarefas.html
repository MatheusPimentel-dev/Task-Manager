{% extends "base.html" %}

{% block content %}

<h2>Nova Tarefa</h2>

<form method="POST" class="row g-3">

  <div class="col-md-4">
    <input name="title" class="form-control" placeholder="Tarefa" required>
  </div>

  <div class="col-md-2">
    <input type="number" name="importance" class="form-control" placeholder="Importância" required>
  </div>

  <div class="col-md-2">
    <input type="number" name="urgency" class="form-control" placeholder="Urgência" required>
  </div>

  <div class="col-md-2">
    <input type="number" name="duration" class="form-control" placeholder="Minutos" required>
  </div>

  <div class="col-md-2">
    <input type="time" name="scheduled_time" class="form-control">
  </div>

  <div class="col-12">
    <label class="form-label">Dias da semana</label><br>

    {% for i, dia in enumerate(['Seg','Ter','Qua','Qui','Sex','Sáb','Dom']) %}
      <input type="checkbox" name="days_of_week" value="{{ i }}"> {{ dia }}
    {% endfor %}
  </div>

  <div class="col-12">
    <input type="checkbox" name="fixed" value="1"> Tarefa fixa
  </div>

  <div class="col-12">
    <button class="btn btn-primary">Salvar</button>
  </div>

</form>

<hr>
